# ==============================================================================
# KITTY CONFIGURATION - ARCH + SWAY
# ==============================================================================

# --- Tema e Shell ---
shell /usr/bin/zsh

# BEGIN_KITTY_THEME
# Gnome-ish gray-on-black
include current-theme.conf
# END_KITTY_THEME

# ==============================================================================
# FONTES (Focado na Hack Nerd Font e Powerlevel10k)
# ==============================================================================

font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

# Tamanho base da fonte
font_size 11.5

# Comportamento de ligaduras (ligatures)
# 'cursor' faz com que símbolos como "=>" ou "!=" fiquem desenhados juntos, 
# mas se separem magicamente quando você coloca o cursor do teclado em cima 
# deles para editar, facilitando a programação.
disable_ligatures cursor

# Ajustes de renderização
# Aumentar levemente a altura da linha (cell_height) costuma deixar o prompt 
# do Powerlevel10k mais bonito e menos espremido. Teste e ajuste se necessário.
modify_font cell_height 110%
modify_font underline_position 2
modify_font underline_thickness 150%

# Otimização de renderização de texto para Wayland/Linux
text_composition_strategy platform

# ==============================================================================
# VISUAL E INTERFACE (Estilo Ricing)
# ==============================================================================

# Opacidade (Deixa o terminal levemente transparente, combinando com o Sway)
# Se não gostar da transparência, mude para 1.0
#background_opacity 0.92

# Espaçamento interno da janela (padding) para a fonte não colar nas bordas
window_padding_width 6

# Remove a barra de título do sistema (o Sway já gerencia as bordas)
hide_window_decorations yes

# Cursor do mouse e do terminal
cursor_shape beam
cursor_blink_interval 0.5
mouse_hide_wait 3.0

# ==============================================================================
# COMPORTAMENTO / PERFORMANCE / WAYLAND
# ==============================================================================

# Força o uso do Wayland nativo (ideal para rodar liso no Sway)
linux_display_server wayland

# Sincronização com o monitor para evitar screen tearing
sync_to_monitor yes

# Desativa o som de "beep" irritante do terminal
enable_audio_bell no
