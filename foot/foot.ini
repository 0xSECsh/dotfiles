[main]
font=monospace:size=7
dpi-aware=yes

[colors-dark]
alpha=0.95

foreground=c0c0c0
background=0f0f0f

# cores básicas (opcional, mas ajuda a manter consistência)
regular0=1c1c1c   # preto
regular1=cc3333   # vermelho
regular2=7f9f7f   # verde
regular3=f0dfaf   # amarelo
regular4=7cb8ff   # azul
regular5=dc8cc3   # magenta
regular6=93e0e3   # ciano
regular7=dcdccc   # branco (suave)

bright0=444444
bright1=ff5555
bright2=99cc99
bright3=ffe082
bright4=82aaff
bright5=ff9bf5
bright6=a7ffeb
bright7=eeeeee

[cursor]
style=block
blink=yes

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000

[key-bindings]
# exemplo: Ctrl+Shift+C/V
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
